<head>
  <meta charset="UTF-8" />

  <meta name="robots" content="index, follow, max-image-preview:large" />
  <meta name="theme-color" content="#0a1f44" />

  <meta property="og:type" content="website" />
  <meta property="og:locale" content="he_IL" />
  <meta property="og:site_name" content="ולנטינה נחשונוב Couture" />
  <meta property="og:title" content="בלוג אופנה | מאמרים והשראה — ולנטינה נחשונוב" />
  <meta property="og:description" content="מאמרי אופנה, מדריכי סטיילינג וטיפים לבחירת שמלת ערב מושלמת." />
  <meta property="og:url" content="https://pavelbk10.github.io/valentina-nachshonov-couture/articles.html" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Frank+Ruhl+Libre:wght@300;400;500;600;700;900&family=Assistant:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="nav nav--solid" id="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo">
        <span class="nav__logo-mark">VN</span>
        <span class="nav__logo-text">ולנטינה נחשונוב</span>
      </a>
      <nav class="nav__links">
        <a href="index.html" class="nav__link">בית</a>
        <a href="index.html#store" class="nav__link">חנות</a>
        <a href="index.html#portfolio" class="nav__link">תיק עבודות</a>
        <a href="index.html#contact" class="nav__link nav__link--cta">צרו קשר</a>
      </nav>
    </div>
  </header>

  <main class="page-wrap">
    <section class="blog">
      <div class="section__head">
        <p class="section__eyebrow">בלוג אופנה</p>
        <h1 class="section__title">מאמרים והשראה</h1>
        <p class="section__lead">מדריכי סטיילינג, טיפים לבחירת שמלה והשראה לאירוע המושלם.</p>
      </div>
      <div class="blog__grid blog__grid--all" id="articlesGrid"></div>
    </section>
  </main>

  <footer class="page-foot">
    <p>© 2026 ולנטינה נחשונוב · מעצבת בגדים</p>
    <a href="index.html" class="btn btn--ghost">חזרה לעמוד הבית ←</a>
  </footer>

  <script src="assets/js/data.js"></script>
  <script>
    function swatchStyle(p) {
      return `background: linear-gradient(150deg, ${p[0]} 0%, ${p[1]} 55%, ${p[2]} 100%);`;
    }
    (function () {
      var grid = document.getElementById("articlesGrid");
      if (!grid || typeof ARTICLES === "undefined") return;
      grid.innerHTML = ARTICLES.map(function (a) {
        return `
        <a class="blog-card" href="article-${a.id}.html">
          <div class="blog-card__media" style="${swatchStyle(a.palette)}">
            <span class="blog-card__cat">${a.category}</span>
          </div>
          <div class="blog-card__body">
            <div class="blog-card__meta"><span>${a.date}</span><span>${a.read}</span></div>
            <h2 class="blog-card__title">${a.title}</h2>
            <p class="blog-card__excerpt">${a.excerpt}</p>
            <span class="blog-card__more">קריאת המאמר</span>
          </div>
        </a>`;
      }).join("");
    })();
  </script>
</body>
</html>
